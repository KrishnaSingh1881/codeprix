<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scroll Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    #hero {
      position: relative;
      height: 280vh;
    }

    #canvas-container {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #anim-wrapper {
      position: relative;
      width: clamp(320px, 65vw, 1100px);
      /* aspect ratio matches source frames (16:9) minus the cropped bottom strip */
      aspect-ratio: 16 / 8.4;
      flex-shrink: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #title-overlay {
      position: absolute;
      top: 6%;
      left: 50%;
      transform: translateX(-50%);
      width: clamp(200px, 60%, 600px);
      z-index: 10;
      pointer-events: none;
      will-change: opacity;
    }

    #title-overlay img {
      width: 100%;
      height: auto;
      display: block;
    }

    #progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      width: 0%;
      background: rgba(255, 255, 255, 0.6);
      z-index: 100;
      transition: width 0.05s linear;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.6s ease;
    }

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loader-text {
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 20px;
    }

    #loader-bar-track {
      width: 200px;
      height: 1px;
      background: rgba(255,255,255,0.15);
    }

    #loader-bar-fill {
      height: 100%;
      width: 0%;
      background: rgba(255,255,255,0.7);
      transition: width 0.1s linear;
    }

    #content {
      padding: 120px 60px;
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
    }

    #content h2 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
    }

    #content p {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <div id="loader">
    <div id="loader-text">Loading</div>
    <div id="loader-bar-track">
      <div id="loader-bar-fill"></div>
    </div>
  </div>

  <div id="progress-bar"></div>

  <section id="hero">
    <div id="canvas-container">
      <div id="anim-wrapper">
        <canvas id="anim-canvas"></canvas>
        <div id="title-overlay">
          <img src="codeprix-title.png.jpeg" alt="CODEPRIX" />
        </div>
      </div>
    </div>
  </section>

  <section id="content">
    <h2>Built for the road ahead.</h2>
    <p>Scroll up to experience the journey from every angle.</p>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script>
    const FRAME_COUNT = 240;
    const FRAME_DIR = 'ezgif-76a16448b4707fbb-jpg';

    const canvas = document.getElementById('anim-canvas');
    const ctx = canvas.getContext('2d');
    const hero = document.getElementById('hero');
    const loader = document.getElementById('loader');
    const loaderFill = document.getElementById('loader-bar-fill');
    const progressBar = document.getElementById('progress-bar');

    const images = new Array(FRAME_COUNT);
    let loadedCount = 0;
    let currentFrame = 0;
    let rafId = null;
    let targetFrame = 0;

    function framePath(i) {
      const n = String(i + 1).padStart(3, '0');
      return `${FRAME_DIR}/ezgif-frame-${n}.jpg`;
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      drawFrame(currentFrame);
    }

    function drawFrame(index) {
      const img = images[index];
      if (!img || !img.complete) return;

      const cw = canvas.width;
      const ch = canvas.height;
      const iw = img.naturalWidth;
      const ih = img.naturalHeight;

      // Cover fit
      const scale = Math.max(cw / iw, ch / ih);
      const dw = iw * scale;
      const dh = ih * scale;
      const dx = (cw - dw) / 2;
      const dy = (ch - dh) / 2;

      ctx.clearRect(0, 0, cw, ch);
      ctx.drawImage(img, dx, dy, dw, dh);
    }

    function onScroll() {
      const heroRect = hero.getBoundingClientRect();
      const scrollable = hero.offsetHeight - window.innerHeight;
      const scrolled = Math.max(0, -heroRect.top);
      const progress = Math.min(1, scrolled / scrollable);

      targetFrame = Math.min(FRAME_COUNT - 1, Math.floor(progress * (FRAME_COUNT - 1)));
      progressBar.style.width = (progress * 100) + '%';

      scheduleRender();
    }

    function scheduleRender() {
      if (rafId) return;
      rafId = requestAnimationFrame(render);
    }

    function render() {
      rafId = null;
      if (currentFrame !== targetFrame) {
        currentFrame = targetFrame;
        drawFrame(currentFrame);
      }
    }

    function preloadAll() {
      for (let i = 0; i < FRAME_COUNT; i++) {
        const img = new Image();
        img.src = framePath(i);
        img.onload = () => {
          loadedCount++;
          const pct = (loadedCount / FRAME_COUNT) * 100;
          loaderFill.style.width = pct + '%';

          if (loadedCount === 1) {
            // Draw first frame as soon as it's ready
            resizeCanvas();
          }

          if (loadedCount === FRAME_COUNT) {
            loader.classList.add('hidden');
            drawFrame(0);
          }
        };
        img.onerror = () => { loadedCount++; };
        images[i] = img;
      }
    }

    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', resizeCanvas);

    // GSAP ScrollTrigger: fade out title overlay over first 50% of hero scroll
    gsap.registerPlugin(ScrollTrigger);

    gsap.to('#title-overlay', {
      opacity: 0,
      ease: 'none',
      scrollTrigger: {
        trigger: '#hero',
        start: 'top top',
        end: '20% top',
        scrub: true,
      }
    });

    resizeCanvas();
    preloadAll();
  </script>
</body>
</html>
